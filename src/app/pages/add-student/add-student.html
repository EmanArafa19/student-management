<div class="container my-5">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0"> Add New Student</h4>
        </div>

        <div class="card-body p-4">
            <form (ngSubmit)="add()">

                <h5 class="section-title">Personal Information</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" [(ngModel)]="student.firstName" name="firstName" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" [(ngModel)]="student.lastName" name="lastName" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" [(ngModel)]="student.age" name="age">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Gender</label>
                        <select class="form-select" [(ngModel)]="student.gender" name="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Level</label>
                        <input type="number" class="form-control" [(ngModel)]="student.level" name="level" min="1" max="4">
                    </div>
                </div>

                <h5 class="section-title mt-4">Contact Information</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" [(ngModel)]="student.email" name="email">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" [(ngModel)]="student.phone" name="phone">
                    </div>
                </div>

                <!-- Academic Info -->
                <h5 class="section-title mt-4">Academic Information</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Department</label>
                        <input type="text" class="form-control" [(ngModel)]="student.department" name="department">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">GPA</label>
                        <input type="number" class="form-control" [(ngModel)]="student.GPA" name="GPA" step="0.1" min="0" max="4">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Enrollment Date</label>
                        <input type="date" class="form-control" [(ngModel)]="student.enrollmentDate" name="enrollmentDate">
                    </div>
                </div>

                <!-- Address -->
                <h5 class="section-title mt-4">Address</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" [(ngModel)]="student.address" name="address">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" [(ngModel)]="student.city" name="city">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control" [(ngModel)]="student.country" name="country">
                    </div>
                </div>

                <div class="form-check mt-4">
                    <input type="checkbox" class="form-check-input" [(ngModel)]="student.isActive" name="isActive" id="isActive">
                    <label class="form-check-label" for="isActive">Active Student</label>
                </div>

                <div class="text-end mt-4">
                    <button type="submit" class="btn btn-success px-5">Add Student</button>
                </div>

            </form>
        </div>
    </div>
</div>
